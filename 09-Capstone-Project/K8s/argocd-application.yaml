apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: flask-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Tejashwini-Javejar/orn-ai-devops-assessment.git
    targetRevision: main
    path: Capstone Project/K8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
