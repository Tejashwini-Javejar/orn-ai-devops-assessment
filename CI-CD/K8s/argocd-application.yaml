apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-boot-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/<YOUR_USERNAME>/orn-ai-devops-assessment.git
    targetRevision: main
    path: K8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
